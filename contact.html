  <!-- Contact -->
  <main class="contact-page">
    <div class="container">
      <div class="contact-grid">

        <!-- フォーム（左） -->
        <div class="contact-main">
          <h1 class="section-title">Contact</h1>
          <p class="section-desc">
            お仕事のご依頼・ご相談など、お気軽にお問い合わせください。
          </p>

          <form class="contact-form" id="contact-form">
            <div class="form-row">
              <label for="name">お名前</label>
              <input type="text" id="name" name="name" placeholder="例）山田 太郎" required>
            </div>
            <div class="form-row">
              <label for="email">メールアドレス</label>
              <input type="email" id="email" name="email" placeholder="例）hello@example.com" required>
            </div>
            <div class="form-row">
              <label for="subject">件名</label>
              <input type="text" id="subject" name="subject" placeholder="例）Webサイト制作のご相談">
            </div>
            <div class="form-row">
              <label for="message">メッセージ</label>
              <textarea id="message" name="message" placeholder="例）ご依頼の内容やご質問などをご入力ください。" required></textarea>
            </div>
            <button type="submit" class="btn-dark">送信する</button>
          </form>
        </div>

        <!-- サイド（右） -->
        <div class="contact-side">

          <!-- SNS -->
          <div class="contact-sns">
            <h3>SNS</h3>
            <div class="sns-icons">
              <a href="#" class="sns-icon" aria-label="Twitter">𝕏</a>
              <a href="#" class="sns-icon" aria-label="GitHub">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">

                </svg>

              <a href="#" class="sns-icon" aria-label="Instagram">

          <!-- Email -->

            <h3>Email</h3>
            <a href="mailto:hello@shun-web.com">hello@shun-web.com</a>
          </div>
