  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ナビゲーション -->
  <header>
    <nav>
      <a href="index.html" class="nav-logo">
        <span class="nav-logo-name">SHUN</span>
        <span class="nav-logo-sub">Web Coder</span>
      </a>
      <ul class="nav-links">
        <li><a href="about.html">About</a></li>
        <li><a href="works.html">Works</a></li>
        <li><a href="skills.html">Skills</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
      <button class="hamburger" id="hamburger" aria-label="メニューを開く">
        <span></span><span></span><span></span>
      </button>
    </nav>
  </header>
  <div class="mobile-nav-overlay" id="mobile-nav-overlay"></div>
  <nav class="mobile-nav" id="mobile-nav">
    <ul>
      <li><a href="about.html">About</a></li>
      <li><a href="works.html">Works</a></li>
      <li><a href="skills.html">Skills</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>

  <!-- Contact -->
  <main class="contact-page">
    <div class="container">
      <div class="contact-grid">

        <!-- フォーム（左） -->
        <div class="contact-main">
          <h1 class="section-title">Contact</h1>
          <p class="section-desc">
            お仕事のご依頼・ご相談など、お気軽にお問い合わせください。
          </p>

          <form class="contact-form" id="contact-form">
            <div class="form-row">
              <label for="name">お名前</label>
              <input type="text" id="name" name="name" placeholder="例）朝倉 玲" required>
            </div>
            <div class="form-row">
              <label for="email">メールアドレス</label>
              <input type="email" id="email" name="email" placeholder="例）hello@example.com" required>
            </div>
            <div class="form-row">
              <label for="subject">件名</label>
              <input type="text" id="subject" name="subject" placeholder="例）Webサイト制作のご相談">
            </div>
            <div class="form-row">
              <label for="message">メッセージ</label>
              <textarea id="message" name="message" placeholder="例）ご依頼の内容やご質問などをご入力ください。" required></textarea>
            </div>
            <button type="submit" class="btn-dark">送信する</button>
          </form>
        </div>

        <!-- サイド（右） -->
        <div class="contact-side">

          <!-- Email -->
          <div class="contact-email">
            <h3>Email</h3>
            <a href="mailto:shun.web.cr.jp@gmail.com">shun.web.cr.jp@gmail.com</a>
          </div>

          <!-- 装飾画像 -->
          <div class="contact-side-image">
            <!-- images/contact-side.jpg を用意してください（植物・インテリアなど） -->
            <img src="images/contact-side.jpg" alt="">
          </div>

        </div>
      </div>
    </div>
  </main>

  <!-- フッター -->
  <footer>
    <div class="footer-inner">
      <p class="footer-copy">&copy; 2026 SHUN</p>
      <ul class="footer-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="works.html">Works</a></li>
        <li><a href="skills.html">Skills</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
